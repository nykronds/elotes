<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elotes El Jefe - Pedidos Privados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body class="bg-stone-50 font-sans pb-10">

    <header class="bg-yellow-400 p-6 shadow-md flex justify-between items-center">
        <h1 class="text-2xl font-black text-orange-900">🌽 ELOTES "EL JEFE"</h1>
        <button onclick="loginAdmin()" class="text-[10px] text-orange-700 opacity-40 hover:opacity-100 italic">Acceso Admin</button>
    </header>

    <main class="max-w-6xl mx-auto p-4 grid md:grid-cols-2 gap-8 mt-4">
        
        <!-- SECCIÓN MENÚ CON SELECTOR DE CANTIDAD -->
        <section id="menu-section">
            <h2 class="text-xl font-black text-orange-900 mb-4 border-b-2 border-yellow-400 inline-block uppercase italic">Menú (Mínimo 2 piezas el pedido)</h2>
            <div class="space-y-4">
                
                <!-- Producto 1 -->
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-orange-500 flex flex-col gap-3">
                    <div class="flex justify-between items-center">
                        <div><h3 class="font-bold text-lg">Esquites Tradicionales</h3><p class="text-xs text-gray-500 italic">El sabor de la calle en vaso.</p></div>
                        <span class="font-bold text-green-600 text-xl">$45</span>
                    </div>
                    <div class="flex items-center justify-between bg-stone-100 p-2 rounded-lg">
                        <div class="flex items-center gap-4">
                            <button onclick="cambiarCant('cant-esquites', -1)" class="bg-white w-8 h-8 rounded-full shadow font-bold text-orange-600">-</button>
                            <span id="cant-esquites" class="font-black text-lg">2</span>
                            <button onclick="cambiarCant('cant-esquites', 1)" class="bg-white w-8 h-8 rounded-full shadow font-bold text-orange-600">+</button>
                        </div>
                        <button onclick="pedirProducto('Esquites', 'cant-esquites')" class="bg-orange-500 text-white px-4 py-2 rounded-lg font-bold text-xs uppercase hover:bg-orange-600">Agregar al chat</button>
                    </div>
                </div>

                <!-- Producto 2 -->
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-orange-500 flex flex-col gap-3">
                    <div class="flex justify-between items-center">
                        <div><h3 class="font-bold text-lg">Elote (CHAROLA) </h3><p class="text-xs text-gray-500 italic">Asado al carbón o cocido.</p></div>
                        <span class="font-bold text-green-600 text-xl">$80</span>
                    </div>
                    <div class="flex items-center justify-between bg-stone-100 p-2 rounded-lg">
                        <div class="flex items-center gap-4">
                            <button onclick="cambiarCant('cant-elote', -1)" class="bg-white w-8 h-8 rounded-full shadow font-bold text-orange-600">-</button>
                            <span id="cant-elote" class="font-black text-lg">2</span>
                            <button onclick="cambiarCant('cant-elote', 1)" class="bg-white w-8 h-8 rounded-full shadow font-bold text-orange-600">+</button>
                        </div>
                        <button onclick="pedirProducto('Elote Entero', 'cant-elote')" class="bg-orange-500 text-white px-4 py-2 rounded-lg font-bold text-xs uppercase hover:bg-orange-600">Agregar al chat</button>
                    </div>
                </div>

            </div>
        </section>

        <!-- SECCIÓN CHAT PRIVADO -->
        <section class="bg-white rounded-2xl shadow-xl border overflow-hidden flex flex-col h-[600px]">
            <div id="chat-header" class="bg-orange-600 p-4 text-white font-bold flex justify-between items-center shadow-md">
                <span id="chat-title" class="truncate mr-2">Chat de Pedidos</span>
                <button id="back-btn" onclick="mostrarListaChats()" class="hidden bg-orange-800 px-3 py-1 rounded-full text-xs hover:bg-orange-900 transition">⬅ Volver</button>
            </div>

            <div id="admin-list" class="hidden flex-1 overflow-y-auto p-2 bg-gray-100 space-y-2"></div>

            <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-3 bg-stone-50 scroll-smooth">
                <p class="text-center text-gray-400 text-xs mt-10 italic">Regístrate para iniciar tu pedido privado.</p>
            </div>

            <!-- Registro -->
            <div id="login-fields" class="p-4 border-t bg-white shadow-inner">
                <p class="text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">Tus Datos para el Pedido:</p>
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <input type="text" id="user-name" placeholder="Nombre" class="p-3 border rounded-xl text-sm focus:ring-2 focus:ring-orange-400 outline-none">
                    <input type="tel" id="user-phone" placeholder="Teléfono" class="p-3 border rounded-xl text-sm focus:ring-2 focus:ring-orange-400 outline-none">
                </div>
                <button onclick="registrarUsuario()" class="w-full bg-orange-600 text-white font-black py-3 rounded-xl text-sm shadow-lg active:scale-95 transition">INICIAR PEDIDO</button>
            </div>

            <!-- Input de Mensaje -->
            <form id="order-form" class="hidden p-4 border-t bg-white flex gap-2">
                <input type="text" id="user-msg" placeholder="Confirma tu pedido aquí..." class="flex-1 p-3 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-green-400">
                <button type="submit" class="bg-green-600 text-white px-5 py-2 rounded-xl font-black uppercase text-xs shadow-md">Enviar</button>
            </form>
        </section>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCuTAP6pD7y2fqOzKlcnLeDJ5tBxLYxmFw",
            authDomain: "elotes-55ec9.firebaseapp.com",
            databaseURL: "https://elotes-55ec9-default-rtdb.firebaseio.com",
            projectId: "elotes-55ec9",
            storageBucket: "elotes-55ec9.firebasestorage.app",
            messagingSenderId: "360677210948",
            appId: "1:360677210948:web:fc94c8fbd332d6df7cb511"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let esAdmin = false;
        let userAuth = null;
        let chatActivoID = null;

        // LÓGICA DEL MENÚ
        function cambiarCant(id, val) {
            const span = document.getElementById(id);
            let actual = parseInt(span.innerText);
            actual += val;
            if (actual < 2) actual = 2; // Regla: Mínimo 2
            span.innerText = actual;
        }

        function pedirProducto(nombre, idSpan) {
            if (!userAuth && !esAdmin) {
                alert("Primero debes poner tu nombre y teléfono en el chat.");
                return;
            }
            const cantidad = document.getElementById(idSpan).innerText;
            const inputChat = document.getElementById('user-msg');
            inputChat.value = `Hola, quiero pedir ${cantidad} ${nombre}(s).`;
            inputChat.focus();
        }

        // REGISTRO Y ADMIN (Igual que antes pero optimizado)
        function registrarUsuario() {
            const n = document.getElementById('user-name').value;
            const t = document.getElementById('user-phone').value;
            if (n && t) {
                userAuth = { nombre: n, tel: t.replace(/\s+/g, '') };
                chatActivoID = userAuth.tel;
                document.getElementById('login-fields').classList.add('hidden');
                document.getElementById('order-form').classList.remove('hidden');
                document.getElementById('chat-title').innerText = "Pedido de " + n;
                escucharChat(chatActivoID);
            } else { alert("Nombre y teléfono requeridos."); }
        }

        function loginAdmin() {
            const pass = prompt("Clave de Jefe:");
            if (pass === "Elotes2024") {
                esAdmin = true;
                document.getElementById('login-fields').classList.add('hidden');
                document.getElementById('admin-list').classList.remove('hidden');
                document.getElementById('chat-box').classList.add('hidden');
                document.getElementById('chat-title').innerText = "PANEL DE CONTROL";
                cargarListaChats();
            }
        }

        function cargarListaChats() {
            database.ref('chats').on('value', (snapshot) => {
                const list = document.getElementById('admin-list');
                list.innerHTML = '';
                snapshot.forEach((child) => {
                    const tel = child.key;
                    const btn = document.createElement('div');
                    btn.className = "bg-white p-4 rounded-xl shadow-sm border-l-8 border-orange-500 cursor-pointer flex justify-between items-center mb-2";
                    btn.innerHTML = `<div><p class='font-black text-orange-900'>📱 ${tel}</p><p class='text-[10px] text-gray-400'>Nuevos mensajes</p></div><span class='text-orange-500'>➔</span>`;
                    btn.onclick = () => abrirChatPrivado(tel);
                    list.appendChild(btn);
                });
            });
        }

        function abrirChatPrivado(tel) {
            chatActivoID = tel;
            document.getElementById('admin-list').classList.add('hidden');
            document.getElementById('chat-box').classList.remove('hidden');
            document.getElementById('order-form').classList.remove('hidden');
            document.getElementById('back-btn').classList.remove('hidden');
            document.getElementById('chat-title').innerText = "Conversación: " + tel;
            escucharChat(tel);
        }

        function mostrarListaChats() {
            document.getElementById('admin-list').classList.remove('hidden');
            document.getElementById('chat-box').classList.add('hidden');
            document.getElementById('order-form').classList.add('hidden');
            document.getElementById('back-btn').classList.add('hidden');
            document.getElementById('chat-title').innerText = "PANEL DE CONTROL";
        }

        document.getElementById('order-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const msgInput = document.getElementById('user-msg');
            if (msgInput.value.trim() === "") return;
            database.ref('chats/' + chatActivoID).push({
                remitente: esAdmin ? "ADMIN" : userAuth.nombre,
                mensaje: msgInput.value,
                hora: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });
            msgInput.value = '';
        });

        function escucharChat(id) {
            database.ref('chats/' + id).on('value', (snapshot) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = '';
                snapshot.forEach((child) => {
                    const data = child.val();
                    const msgDiv = document.createElement('div');
                    const soyYo = (esAdmin && data.remitente === "ADMIN") || (!esAdmin && data.remitente !== "ADMIN");
                    msgDiv.className = `max-w-[85%] p-3 rounded-2xl text-sm shadow-sm ${soyYo ? 'bg-orange-500 text-white ml-auto rounded-tr-none' : 'bg-white text-gray-800 mr-auto rounded-tl-none border'}`;
                    msgDiv.innerHTML = `<p class='text-[9px] font-bold opacity-60 mb-1'>${data.remitente} - ${data.hora}</p><p class='font-medium'>${data.mensaje}</p>`;
                    box.appendChild(msgDiv);
                });
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
